services:
  - type: web
    name: railway-track-defect-detection
    env: python
    pythonVersion: "3.11"
    repo: https://github.com/KHUAHI-JAISWAL/railway-track-defect-detection
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port 10000
